name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -race ./...
      - run: go vet ./...
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install released CLI
        shell: powershell
        env:
          IMG_INSTALL_DIR: ${{ runner.temp }}\img-bin
        run: |
          .\install.ps1
          & "$env:IMG_INSTALL_DIR\img.exe" version
